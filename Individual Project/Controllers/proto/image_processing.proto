// image_processing.proto
syntax = "proto3";

package imageprocessing;

service ImageProcessor {
    rpc ProcessImage (ImageRequest) returns (ImageResponse);
}

message ImageRequest {
    bytes image_data = 1;
    repeated Operation operations = 2;
    bool generate_thumbnail = 3;
    ThumbnailParams thumbnail_params = 4;
}

message Operation {
    OperationType type = 1;
    RotateParams rotate_params = 2;
    ResizeParams resize_params = 3;
    FlipParams flip_params = 4;
}

enum OperationType {
    ROTATE = 0;
    RESIZE = 1;
    FLIP = 2;
    GRAYSCALE = 3;
}

message RotateParams {
    float angle = 1;
}

message ResizeParams {
    int32 width = 1;
    int32 height = 2;
}

message FlipParams {
    FlipDirection direction = 1;
}

enum FlipDirection {
    HORIZONTAL = 0;
    VERTICAL = 1;
}

message ThumbnailParams {
    int32 max_width = 1;
    int32 max_height = 2;
}

message ImageResponse {
    bool success = 1;
    bytes processed_image = 2;
    bytes thumbnail = 3;
    string error_message = 4;
    string mime_type = 5;
}

